name: Bug report
description: Report a bug, data problem, security concern, or Code of Conduct concern.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. For Code of Conduct concerns, include only information you are comfortable making visible in a GitHub issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it?
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Browser, deployment mode, logs, screenshots, item/loadout names, or wiki links.
    validations:
      required: false
