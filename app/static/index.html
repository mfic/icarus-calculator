<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ICARUS Item Calculator</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="/static/styles.css?v=0.1.2" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>ICARUS Item Calculator</h1>
        <p id="meta">Loading wiki data...</p>
      </div>
      <nav class="topbar-actions" aria-label="Project links">
        <a id="gatherLink" class="secondary button-link" href="/gather" target="_blank" rel="noopener">Gather View</a>
        <a class="secondary button-link" href="https://github.com/mfic/icarus-calculator" target="_blank" rel="noopener">GitHub</a>
      </nav>
    </header>

    <main class="layout">
      <section class="panel items-panel">
        <div class="panel-heading">
          <h2>Items</h2>
          <div class="filters">
            <select id="categoryFilter">
              <option value="">All categories</option>
            </select>
            <select id="subcategoryFilter">
              <option value="">All subcategories</option>
            </select>
            <select id="tierFilter">
              <option value="">All tiers</option>
            </select>
            <div class="search-row">
              <input id="search" type="search" placeholder="Search item, effect, stat, bench, ingredient" />
              <button id="resetFiltersBtn" class="secondary" type="button">Reset</button>
            </div>
          </div>
        </div>
        <div id="items" class="item-list"></div>
      </section>

      <aside class="panel loadout-panel">
        <div class="panel-heading">
          <h2>Loadouts</h2>
          <form id="loadoutForm" class="inline-form">
            <input id="loadoutName" type="text" placeholder="New Loadout" maxlength="80" />
            <button type="submit">Create</button>
          </form>
        </div>
        <div class="account-tools">
          <div class="code-tools-row">
            <span class="muted">Account code:</span>
            <div class="code-tools-stack">
              <span id="accountId" class="code-pill"></span>
              <div class="account-action-row">
                <button id="copyAccountBtn" class="secondary" type="button">Copy</button>
                <button id="switchAccountBtn" class="secondary" type="button">Use different code</button>
              </div>
            </div>
          </div>
        </div>
        <select id="loadoutSelect"></select>
        <div class="share-tools">
          <div class="code-tools-row">
            <span class="muted">Loadout code:</span>
            <div class="code-tools-stack">
              <span id="loadoutId" class="code-pill">No loadout selected</span>
              <div class="loadout-action-row">
                <button id="copyShareBtn" class="secondary" type="button">Copy Link</button>
                <button id="exportLoadoutBtn" class="secondary" type="button">Export</button>
                <label class="file-button">
                  Import
                  <input id="importLoadoutInput" type="file" accept="application/json,.json" />
                </label>
              </div>
            </div>
          </div>
        </div>
        <div id="shareSection" class="share-row" hidden>
          <span class="muted">Shared with:</span>
          <div id="sharedWithChips" class="ignored-chips"></div>
          <button id="addShareBtn" class="secondary" type="button">Share</button>
        </div>
        <span id="sharedBadge" class="muted" hidden>Shared with you</span>
        <div id="loadoutItems" class="loadout-items"></div>

        <div class="section-heading">
          <h3>Bare Materials</h3>
          <button id="clearCollectedBtn" class="secondary" type="button">Clear Collected</button>
        </div>
        <div id="ignoredMaterials" class="ignored-chips" hidden></div>
        <div id="materials" class="summary-list"></div>

        <h3>Crafting Steps</h3>
        <div id="steps" class="steps-list"></div>
      </aside>
    </main>

    <template id="itemTemplate">
      <article class="item-card">
        <div class="item-main">
          <h3></h3>
          <p class="bench"></p>
          <div class="categories"></div>
          <div class="effects"></div>
          <details>
            <summary>Recipe</summary>
            <ul class="recipe"></ul>
          </details>
        </div>
        <div class="add-control">
          <input type="number" min="1" value="1" />
          <button type="button">Add</button>
        </div>
      </article>
    </template>

    <script src="/static/shared.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
